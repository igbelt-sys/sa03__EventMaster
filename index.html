<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventMaster | Credenciamento de Convidados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="titulo-app">
            <h1>Event Master</h1>
            <p>Credenciamento de convidados</p>
        </div>
        <button id="toggleDarkMode" type="button">Alternar modo escuro</button>
    </header>

    <main>
        <section aria-labelledby="titulo-formulario">
            <h2 id="titulo-formulario">Cadastro de convidados</h2>

            <form id="formConvidado">
                <div>
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div>
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" required>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" required>
                </div>

                <div>
                    <label for="empresa">Empresa ou Instituição</label>
                    <input type="text" id="empresa" name="empresa" required>
                </div>

                <button type="submit">Cadastrar convidado</button>
            </form>

            <p id="mensagemErro" class="erro" aria-live="polite"></p>
        </section>

        <section aria-labelledby="titulo-lista">
            <h2 id="titulo-lista">Lista de Confirmados</h2>
            <div id="listaConfirmados"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
